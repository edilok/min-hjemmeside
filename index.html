<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min App-side</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: url('IMG_5185.jpeg') no-repeat center center fixed;
      background-size: cover;
      color: #111;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      padding: 40px;
      justify-items: center; /* sentrer knappene */
    }

    .app-button {
      background: rgba(200, 220, 255, 0.9);
      padding: 15px 20px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      font-size: 1rem;
      text-align: center;
      width: 140px;  /* fast bredde for app-lignende utseende */
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .app-button a {
      color: #111;
      text-decoration: none;
      font-weight: bold;
      display: block;
    }

    .app-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    @media (max-width: 500px) {
      .container {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
      .app-button {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-button"><a href="https://www.icloud.com/" target="_blank">🍏 iCloud</a></div>
    <div class="app-button"><a href="https://photos.google.com/" target="_blank">📸 Google Photos</a></div>
    <div class="app-button"><a href="https://www.nrk.no/" target="_blank">📰 Nyheter</a></div>
    <div class="app-button"><a href="https://www.yr.no/" target="_blank">☀️ Vær</a></div>
    <div class="app-button"><a href="https://www.spotify.com/" target="_blank">🎵 Spotify</a></div>
    <div class="app-button"><a href="https://music.apple.com/" target="_blank">🍎 Apple Music</a></div>
    <div class="app-button"><a href="https://www.facebook.com/" target="_blank">📘 Facebook</a></div>
    <div class="app-button"><a href="https://www.instagram.com/" target="_blank">📸 Instagram</a></div>
  </div>
</body>
</html>
