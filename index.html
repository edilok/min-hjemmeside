<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velkommen</title>
  <!-- Font Awesome for ikoner -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('IMG_5185.jpeg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
    }

    /* Overlay for kontrast */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
      z-index: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 3em;
      text-shadow: 2px 2px 8px #000;
      z-index: 1;
      position: relative;
    }

    .category {
      margin: 40px 20px 20px;
      z-index: 1;
      position: relative;
    }

    .category h2 {
      text-align: left;
      margin-left: 10%;
      font-size: 2em;
      text-shadow: 1px 1px 4px #000;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 10px auto 50px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: rgba(255, 255, 255, 0.2); /* gjennomsiktig */
      color: #fff;
      padding: 15px 25px;
      border: 2px solid rgba(200,200,200,0.6); /* grå ramme */
      box-shadow: 4px 4px 10px rgba(50,50,50,0.6); /* mørk skygge */
      border-radius: 0; /* firkantet */
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      min-width: 140px;
    }

    .btn i {
      font-size: 1.2em;
    }

    .btn:hover {
      background-color: rgba(255, 255, 255, 0.5);
      color: #000;
      transform: scale(1.05);
      box-shadow: 6px 6px 15px rgba(50,50,50,0.8);
    }

    @media (max-width: 600px) {
      .btn {
        padding: 10px 15px;
        font-size: 0.9em;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <h1>Velkommen</h1>

  <!-- Nyheter -->
  <div class="category">
    <h2>📰 Nyheter</h2>
    <div class="button-container">
      <a class="btn" href="https://www.vg.no" target="_blank"><i class="fas fa-newspaper"></i> VG</a>
      <a class="btn" href="https://www.dagbladet.no" target="_blank"><i class="fas fa-newspaper"></i> Dagbladet</a>
      <a class="btn" href="https://www.nettavisen.no" target="_blank"><i class="fas fa-newspaper"></i> Nettavisen</a>
      <a class="btn" href="https://www.tb.no" target="_blank"><i class="fas fa-newspaper"></i> TB.no</a>
      <a class="btn" href="https://www.sb.no" target="_blank"><i class="fas fa-newspaper"></i> SB.no</a>
      <a class="btn" href="https://www.dt.no" target="_blank"><i class="fas fa-newspaper"></i> DT.no</a>
    </div>
  </div>

  <!-- Radio & TV -->
  <div class="category">
    <h2>📺 Radio & TV</h2>
    <div class="button-container">
      <a class="btn" href="https://tv.nrk.no" target="_blank"><i class="fas fa-tv"></i> NRK TV </a>
      <a class="btn" href="https://radio.nrk.no" target="_blank"><i class="fas fa-tv"></i> Radio NRK</a>
    </div>
  </div>

  <!-- Musikk -->
  <div class="category">
    <h2>🎵 Musikk</h2>
    <div class="button-container">
      <a class="btn" href="https://www.spotify.com" target="_blank"><i class="fab fa-spotify"></i> Spotify</a>
      <a class="btn" href="https://music.apple.com" target="_blank"><i class="fab fa-apple"></i> Apple Musikk</a>
    </div>
  </div>

  <!-- Sosiale medier -->
  <div class="category">
    <h2>💬 Sosiale medier</h2>
    <div class="button-container">
      <a class="btn" href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
      <a class="btn" href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
      <a class="btn" href="https://www.msn.com" target="_blank"><i class="fas fa-globe"></i> MSN</a>
    </div>
  </div>

  <!-- Andre -->
  <div class="category">
    <h2>🌐 Andre</h2>
    <div class="button-container">
      <a class="btn" href="https://www.google.com/maps" target="_blank"><i class="fas fa-map-marker-alt"></i> Maps</a>
      <a class="btn" href="https://www.google.com" target="_blank"><i class="fas fa-search"></i> Google</a>
      <a class="btn" href="https://www.yr.no" target="_blank"><i class="fas fa-cloud-sun"></i> Vær</a>
    </div>
  </div>

</body>
</html>
